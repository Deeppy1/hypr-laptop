# ╔══════════════════════════════════════════════════════╗
# ║         HYPRPAPER CONFIG — AMONG TREES THEME         ║
# ╚══════════════════════════════════════════════════════╝

# Pre-load the wallpaper (add more paths if you have per-monitor variants)
preload = ~/.config/hypr/wallpapers/among-trees-dadaws-small-cliffs.jpg

# Apply to all monitors (replace with monitor name e.g. DP-1 if needed)
wallpaper = ,~/.config/hypr/wallpapers/among-trees-dadaws-small-cliffs.jpg

# Set to true to enable IPC so you can hot-swap wallpapers with hyprctl
ipc = on

# Splash text on startup (set false if you don't want it)
splash = false
