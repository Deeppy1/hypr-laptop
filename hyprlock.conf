# ╔══════════════════════════════════════════════════════╗
# ║         HYPRLOCK CONFIG — AMONG TREES THEME          ║
# ║   Deep forest lockscreen with amber glow elements    ║
# ╚══════════════════════════════════════════════════════╝

general {
    disable_loading_bar   = false
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = true
}

# ── Background — use your Among Trees wallpaper ───────────
background {
    monitor  =
    path     = ~/.config/hypr/wallpapers/among-trees-dadaws-small-cliffs.jpg

    # Subtle blur so the forest is still visible behind the UI
    blur_passes   = 3
    blur_size     = 7
    noise         = 0.02
    contrast      = 0.95
    brightness    = 0.70
    vibrancy      = 0.15
    vibrancy_darkness = 0.10
}

# ── Central frosted panel ─────────────────────────────────
shape {
    monitor  =
    size     = 400, 220
    color    = rgba(10, 20, 25, 0.72)
    rounding = 20
    border_size  = 1
    border_color = rgba(232, 147, 90, 0.40)

    position = 0, 60
    halign   = center
    valign   = center
    zindex   = 0

    # Soft amber glow shadow
    shadow           = true
    shadow_size      = 30
    shadow_color     = rgba(232, 147, 90, 0.18)
    shadow_passes    = 3
}

# ── Time ──────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color    = rgba(244, 184, 122, 0.95)
    font_size    = 72
    font_family  = "JetBrainsMono Nerd Font Bold"
    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(0, 0, 0, 0.50)

    position = 0, 110
    halign   = center
    valign   = center
}

# ── Date ──────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color    = rgba(155, 191, 204, 0.85)
    font_size    = 15
    font_family  = "JetBrainsMono Nerd Font"
    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.60)

    position = 0, 58
    halign   = center
    valign   = center
}

# ── Avatar ────────────────────────────────────────────────
image {
    monitor  =
    path     = ~/.face
    size     = 72
    rounding = -1  # full circle
    border_size  = 2
    border_color = rgba(232, 147, 90, 0.55)

    shadow           = true
    shadow_passes    = 2
    shadow_size      = 10
    shadow_color     = rgba(0, 0, 0, 0.50)

    position = 0, -40
    halign   = center
    valign   = center
}

# ── Password input ────────────────────────────────────────
input-field {
    monitor  =
    size     = 280, 46
    outline_thickness = 2
    dots_size    = 0.28
    dots_spacing = 0.18
    dots_center  = true

    outer_color  = rgba(232, 147, 90, 0.50)
    inner_color  = rgba(13, 30, 38, 0.85)
    font_color   = rgba(247, 216, 160, 0.95)
    fade_on_empty = true
    fade_timeout  = 1200

    placeholder_text  = <span foreground='##5a8a9f'>󰍁  Enter password</span>
    hide_input         = false

    check_color  = rgba(74, 159, 181, 0.80)
    fail_color   = rgba(196, 97, 74, 0.90)
    fail_text    = <span foreground='##f07060'><i>󰟆  incorrect</i></span>
    fail_timeout = 2000

    capslock_color = rgba(240, 192, 96, 0.85)

    rounding = 12
    shadow_passes = 2
    shadow_size   = 10
    shadow_color  = rgba(0, 0, 0, 0.50)

    position = 0, -100
    halign   = center
    valign   = center
}

# ── Hint label ────────────────────────────────────────────
label {
    monitor  =
    text     = "󰌒  type to unlock"
    color    = rgba(90, 138, 159, 0.70)
    font_size    = 11
    font_family  = "JetBrainsMono Nerd Font Italic"

    position = 0, -152
    halign   = center
    valign   = center
}
