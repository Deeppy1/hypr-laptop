# ╔══════════════════════════════════════════════════════╗
# ║              hypridle.conf — laptop profile          ║
# ║              Dell Precision 5540 / eDP-1             ║
# ╚══════════════════════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock          # don't spawn a second instance
    before_sleep_cmd = loginctl lock-session        # lock before suspend kicks in
    after_sleep_cmd = hyprctl dispatch dpms on      # wake display on resume
    ignore_dbus_inhibit = false                     # respect fullscreen/video inhibits
}

# ── 1. Dim screen after 90 seconds idle ──────────────────
# Uses ~/bin/dim-brightness.sh to dim proportionally:
#   100% brightness → dims to ~20%   (home)
#    25% brightness → dims to ~5%    (school)
# Edit DIM_RATIO in the script to change the fraction.
listener {
    timeout = 90
    on-timeout = bash /home/Henry/bin/dim-brightness.sh
    on-resume = bash -c 'f=/tmp/hypridle-brightness-save; [ -f "$f" ] && brightnessctl set "$(cat $f)"'
}

# ── 2. Lock screen after 2 minutes idle ──────────────────
listener {
    timeout = 120
    on-timeout = loginctl lock-session
    on-resume = hyprctl dispatch dpms on
}

# ── 3. Turn display off after 4 minutes idle ─────────────
listener {
    timeout = 240
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# ── 4. Suspend after 5 minutes idle ──────────────────────
listener {
    timeout = 300
    on-timeout = systemctl suspend
}
