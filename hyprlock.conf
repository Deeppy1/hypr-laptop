# ╔══════════════════════════════════════════════════════╗
# ║            hyprlock.conf — forest at dusk            ║
# ║   Palette drawn from among-trees-dadaws wallpaper    ║
# ║                                                      ║
# ║  deep navy  #1a2535   amber glow  #ffae3b            ║
# ║  teal mist  #4ea8c4   sun burst   #ffd580            ║
# ║  pine silh  #0f1e2e   warm coral  #ff7859            ║
# ╚══════════════════════════════════════════════════════╝

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ── Background ────────────────────────────────────────────
background {
    monitor =
    path = /home/Henry/.config/hypr/wallpaper/among-trees-dadaws-small-cliffs.jpg

    blur_passes = 2
    blur_size = 6
    brightness = 0.65
    contrast = 1.1
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ── Clock (large, centre-stage) ───────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    font_size = 96
    font_family = JetBrains Mono NF Bold

    color = rgba(ffd580ff)

    position = 0, 120
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0f1e2e99)
    shadow_boost = 1.4
}

# ── Date ──────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    font_size = 22
    font_family = JetBrains Mono NF

    color = rgba(4ea8c4dd)

    position = 0, 40
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0f1e2e99)
}

# ── Password input box ────────────────────────────────────
input-field {
    monitor =
    size = 320, 52

    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1

    # inner fill — deep navy with slight transparency
    inner_color = rgba(1a253599)
    # border idle — teal mist
    outer_color = rgba(4ea8c488)
    # border active — amber glow
    check_color = rgba(ffae3bff)
    # border on fail — warm coral
    fail_color = rgba(ff7859ff)

    font_color = rgba(ffd580ff)
    font_size = 16
    font_family = JetBrains Mono NF

    placeholder_text = <i><span foreground="##4ea8c4">enter password...</span></i>
    fail_text = <i><span foreground="##ff7859">$ATTEMPTS attempt(s) failed</span></i>
    fail_timeout = 2000
    fade_on_empty = true
    hide_input = false
    rounding = 12

    position = 0, -80
    halign = center
    valign = center
}

# ── Hostname label (top-left, subtle) ────────────────────
label {
    monitor =
    text = cmd[update:0] echo " $(hostname)"
    font_size = 13
    font_family = JetBrains Mono NF

    color = rgba(ffd58099)

    position = 28, -28
    halign = left
    valign = top

    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0f1e2ecc)
}

# ── Battery / power hint (bottom-right, subtle) ──────────
label {
    monitor =
    text = cmd[update:30000] echo "$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null && echo '%' || echo '')"
    font_size = 13
    font_family = JetBrains Mono NF

    color = rgba(4ea8c4aa)

    position = -28, 28
    halign = right
    valign = bottom

    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0f1e2ecc)
}
