# ╔══════════════════════════════════════════════════════╗
# ║         HYPRLAND CONFIG — AMONG TREES THEME          ║
# ║   Palette: deep teal forest, amber sunset, coral     ║
# ╚══════════════════════════════════════════════════════╝

# ── Monitors ──────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Autostart ─────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Environment Variables ──────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_SCALE,1

# ══════════════════════════════════════════════════════════
#   LOOK & FEEL
# ══════════════════════════════════════════════════════════

general {
    gaps_in           = 6
    gaps_out          = 14
    border_size       = 2

    # Amber glow active / teal fog inactive
    col.active_border   = rgba(e8935affff) rgba(f4b87aff) 45deg
    col.inactive_border = rgba(1a3a4a99)

    resize_on_border  = true
    layout            = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled       = true
        size          = 8
        passes        = 3
        noise         = 0.02
        contrast      = 1.1
        brightness    = 0.95
        popups        = true
    }

    # Warm amber shadow, like the sun bleeding through pines
    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(e8935a55)
        color_inactive = rgba(0d1a1f99)
        offset        = 0 4
    }

    active_opacity   = 1.0
    inactive_opacity = 0.93
    fullscreen_opacity = 1.0
}

animations {
    enabled = true

    # Smooth, organic — like mist drifting through the trees
    bezier = forestEase,   0.25, 0.46, 0.45, 0.94
    bezier = sunRise,      0.16, 1,    0.3,  1
    bezier = leafFall,     0.4,  0,    0.6,  1

    animation = windows,     1, 5,  sunRise,    popin 85%
    animation = windowsOut,  1, 4,  leafFall,   popin 85%
    animation = border,      1, 8,  forestEase
    animation = borderangle, 1, 30, forestEase, loop
    animation = fade,        1, 5,  forestEase
    animation = workspaces,  1, 6,  sunRise,    slidevert
    animation = specialWorkspace, 1, 5, forestEase, fade
}

dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = true
    smart_resizing    = true
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    animate_manual_resizes  = true
    vfr                     = true
}

# ══════════════════════════════════════════════════════════
#   INPUT
# ══════════════════════════════════════════════════════════

input {
    kb_layout    = gb
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
        scroll_factor     = 0.8
    }
}

gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
}

# ══════════════════════════════════════════════════════════
#   KEYBINDS
# ══════════════════════════════════════════════════════════

$mod = SUPER

# ── Apps ──────────────────────────────────────────────────
bind = $mod,       Return, exec, kitty
bind = $mod,       E,      exec, thunar
bind = $mod,       B,      exec, firefox
bind = $mod SHIFT, S,      exec, grimblast copy area

# ── Rofi launcher ─────────────────────────────────────────
bind = $mod,       Space,  exec, rofi -show drun -theme ~/.config/rofi/among-trees.rasi
bind = $mod SHIFT, Space,  exec, rofi -show run  -theme ~/.config/rofi/among-trees.rasi
bind = $mod,       Tab,    exec, rofi -show window -theme ~/.config/rofi/among-trees.rasi

# ── Hyprlock ──────────────────────────────────────────────
bind = $mod SHIFT, L,      exec, hyprlock

# ── Window management ─────────────────────────────────────
bind = $mod,       Q,      killactive
bind = $mod SHIFT, Q,      exit
bind = $mod,       F,      fullscreen, 0
bind = $mod SHIFT, F,      fakefullscreen
bind = $mod,       V,      togglefloating
bind = $mod,       P,      pseudo
bind = $mod,       J,      togglesplit

# ── Focus movement ────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Window movement ───────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize ────────────────────────────────────────────────
binde = $mod CTRL, right, resizeactive,  30 0
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, up,    resizeactive,  0 -30
binde = $mod CTRL, down,  resizeactive,  0  30

# ── Workspaces ────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Special workspace (scratchpad) ───────────────────────
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspacesilent, special:magic

# ── Scroll through workspaces ─────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Mouse window actions ──────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Volume / brightness ───────────────────────────────────
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Window rules ──────────────────────────────────────────
windowrulev2 = float,           class:^(pavucontrol)$
windowrulev2 = float,           class:^(blueman-manager)$
windowrulev2 = float,           class:^(nm-connection-editor)$
windowrulev2 = float,           title:^(Picture-in-Picture)$
windowrulev2 = pin,             title:^(Picture-in-Picture)$
windowrulev2 = opacity 0.92,    class:^(Code)$
windowrulev2 = opacity 0.92,    class:^(kitty)$
windowrulev2 = opacity 0.95,    class:^(thunar)$
windowrulev2 = noshadow,        floating:0
